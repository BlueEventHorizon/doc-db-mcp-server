# version_config_version: 1.0

targets:
  - name: doc-db-mcp-server
    version_file: VERSION
    version_path: ""          # plain text ファイル（内容がバージョン文字列そのもの）
    sync_files:
      # Formula tag: は "v{version}" 形式（DES-002 §4.1 / APP-002 VER-06）。
      # filter で同一行内に必ず存在する文字列を指定し、誤マッチを防ぐ。
      - path: Formula/doc-db.rb
        pattern: 'tag:      "v{version}"'
        filter: 'tag:'
      # CHANGELOG link 定義（"## [Unreleased]" などはそのままにし、URL 末尾の v{version} を更新する）。
      # 注意: /forge:update-version 実行時に [Unreleased] セクションを新版へ昇格させる挙動は別途の責務。
      # ここでは link 定義の URL に含まれる version 文字列のみを置換対象とする。

changelog:
  file: CHANGELOG.md
  format: keep-a-changelog
  git_log_auto: true          # git log から Conventional Commits を分類して自動挿入
  section_per_target: false   # ターゲット単一のためサブセクション不要

git:
  tag_format: "v{version}"
  commit_message: "chore: bump version to {version}"
  auto_tag: false
  auto_commit: false
