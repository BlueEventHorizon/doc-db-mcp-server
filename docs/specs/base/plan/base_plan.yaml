# === タスク一覧 ===
tasks:
  # ────────────────────────────────────────
  # フェーズ 1: データ基盤とテキスト処理（priority 90-99）
  # ────────────────────────────────────────

  - task_id: TASK-001
    title: プロジェクト骨格・go.mod・依存パッケージ追加
    priority: 99
    status: completed
    design_id: DES-001
    depends_on: []
    group_id: null
    build_check: per_task
    description:
      - go.mod を初期化し module 名・Go バージョンを設定する
      - ディレクトリ構成を作成する（cmd/docdb, internal/{mcp,store,chunker,embedder,fetcher,search,expiry}）
      - 各パッケージに最小限のスタブ（package 宣言のみ）を置き go build ./... が通る状態にする
      - 依存パッケージを go get で追加する（modernc.org/sqlite, MCP go-sdk, golang.org/x/text）
      - cmd/docdb/main.go にスタブ main 関数を置く
    acceptance_criteria: "go build ./... が成功し、go vet ./... が警告なしで通ること"
    required_reading:
      - docs/specs/base/design/DES-001_doc_db_mcp_server_design.md

  - task_id: TASK-002
    title: internal/store — SQLite スキーマ・CRUD・WAL 設定
    priority: 97
    status: completed
    design_id: DES-001
    depends_on:
      - TASK-001
    group_id: null
    build_check: per_task
    description:
      - DES-001 §4.1 のスキーマを Go の CREATE TABLE 文として実装する
      - 起動時に WAL モードとビジータイムアウトを設定する（DES-001 §4.2）
      - 接続プールを設定する（DES-001 §4.2）
      - Store 構造体と全メソッドを実装する（DES-001 §3.2 Store クラス図）
      - CleanOtherSeries ロジックを実装する（DIF-02/DIF-03 両経路で必須・DES-001 §4.3）
      - BM25 テーブル更新方針に従い削除時の bm25_df 整合性を保つトランザクション処理を実装する（DES-001 §6.2）
      - 書き込み操作にミューテックスを適用し読み取りにはロックを掛けない（DES-001 §4.2）
      - embeddings.dim 不一致チェックを起動時に実装する（DES-001 §4.1）
    acceptance_criteria: "go build ./internal/store/... が成功すること"
    required_reading:
      - docs/specs/base/design/DES-001_doc_db_mcp_server_design.md

  - task_id: TASK-003
    title: internal/store 単体テスト
    priority: 95
    status: completed
    design_id: DES-001
    depends_on:
      - TASK-002
    group_id: null
    build_check: per_task
    description:
      - インメモリ SQLite（file::memory:）を使用したテストをセットアップする
      - DIF-02（同一ハッシュ時の series_keys 追記）と DIF-03（新規・変更時の record 作成）の両経路をテストする
      - CleanOtherSeries が DIF-02/DIF-03 両経路で正しく実行されること（「同一 key+path+series は常に高々1 record」）を確認する
      - BM25 テーブル（bm25_stats/bm25_df）の削除時整合性テスト（CASCADE と df 減算の順序）を書く
      - 並行書き込みの Mutex 保護テスト（2 ゴルーチンからの同時 UpsertRecord）を書く
    acceptance_criteria: "go test ./internal/store/... が全通過すること"
    required_reading:
      - docs/specs/base/design/DES-001_doc_db_mcp_server_design.md

  - task_id: TASK-004
