# base 実装計画書

# === トレーサビリティ ===
requirements_traceability:
  # 前提条件
  - requirement_id: PRE-01
    title: OpenAI API キー設定
    design_id: DES-001
    status: pending
  - requirement_id: PRE-02
    title: MCP プロトコル準拠の HTTP transport で接続できること
    design_id: DES-001
    status: pending
  # FNC-001 チャンク分割
  - requirement_id: CHK-01
    title: Markdown 見出し境界（H1〜H6）でチャンク分割・見出し階層パス保持
    design_id: DES-001
    status: pending
  - requirement_id: CHK-02
    title: 見出しなし文書は全体を 1 チャンクとして扱う
    design_id: DES-001
    status: pending
  - requirement_id: CHK-03
    title: チャンク最大サイズ（DOCDB_MAX_CHUNK_SIZE=1500）
    design_id: DES-001
    status: pending
  # FNC-001 差分管理
  - requirement_id: DIF-01
    title: key・path 単位で embedding record を管理（hash/chunks/vectors/series_keys）
    design_id: DES-001
    status: pending
  - requirement_id: DIF-02
    title: 同一ハッシュ時は再 Embedding スキップ・series_keys に追記
    design_id: DES-001
    status: pending
  - requirement_id: DIF-03
    title: ハッシュ不一致時は新規 record 作成・同一 series の旧 record から series 除去
    design_id: DES-001
    status: pending
  # FNC-001 Embedding
  - requirement_id: EMB-01
    title: チャンク単位で Embedding を生成する
    design_id: DES-001
    status: pending
  - requirement_id: EMB-02
    title: Embedding モデル text-embedding-3-small / 次元数 1536（確定値）
    design_id: DES-001
    status: pending
  # FNC-001 出力
  - requirement_id: UPS-OUT-01
    title: 処理結果（処理数・スキップ数・失敗数・失敗パスとエラー内容）を返す
    design_id: DES-001
    status: pending
  - requirement_id: UPS-OUT-02
    title: 一部 Embedding 失敗時も処理継続・失敗情報を結果に含める
    design_id: DES-001
    status: pending
  # FNC-002 削除処理
  - requirement_id: DEL-01
    title: 指定 series を series_keys から除去・空になった record を物理削除
    design_id: DES-001
    status: pending
  - requirement_id: DEL-02
    title: 存在しないパスはスキップし処理結果に警告として含める
    design_id: DES-001
    status: pending
  # FNC-003 検索処理
  - requirement_id: LEX-01
    title: BM25 語彙一致スコア算出・ID パターン完全一致を高スコア処理
    design_id: DES-001
    status: pending
  - requirement_id: SC-01
    title: Embedding スコアと語彙スコアの統合（RRF k=60）
    design_id: DES-001
    status: pending
  - requirement_id: RR-01
    title: LLM Rerank（mode=rerank 時のみ・gpt-4o-mini）
    design_id: DES-001
    status: pending
  - requirement_id: RR-02
    title: LLM Rerank 失敗時は RRF 順でフォールバック
    design_id: DES-001
    status: pending
  # FNC-003 出力
  - requirement_id: QRY-OUT-01
    title: 検索結果に path/heading_path/text/score/score_breakdown/series_keys を含める
    design_id: DES-001
    status: pending
  - requirement_id: QRY-OUT-02
    title: 各ステージ通過候補数（stage_stats）を結果に含める
    design_id: DES-001
    status: pending
  # FNC-004 インデックス管理
  - requirement_id: MNG-01
    title: KEY 別インデックス一覧（KEY/series/doc_count/last_updated/last_accessed/expiry_policy）
    design_id: DES-001
    status: pending
  - requirement_id: MNG-02
    title: 指定 KEY のインデックスを削除できること
    design_id: DES-001
    status: pending
  # FNC-005 廃棄ポリシー
  - requirement_id: EXP-01
    title: TTL（最終アクセスからの経過時間）による自動廃棄
    design_id: DES-001
    status: pending
  - requirement_id: EXP-02
    title: LRU（チャンク総数上限）による自動廃棄
    design_id: DES-001
    status: pending
  - requirement_id: EXP-03
    title: サーバー全体のデフォルト廃棄ポリシーを環境変数で設定できること
    design_id: DES-001
    status: pending
  - requirement_id: EXP-04
    title: KEY ごとに廃棄ポリシーをオーバーライドできること（manage_index ツール）
    design_id: DES-001
    status: pending
  - requirement_id: EXP-05
    title: TTL デフォルト値 30 日・LRU 上限 10000 チャンク（DES-001 §9 確定値）
    design_id: DES-001
    status: pending
  # 非機能要件
  - requirement_id: NFR-01
    title: 複数ユーザーの同時クエリに対応すること
    design_id: DES-001
    status: pending
  - requirement_id: NFR-02
    title: インデックスストレージの並行アクセス耐性（WAL + Mutex）
    design_id: DES-001
    status: pending
  - requirement_id: NFR-03
    title: MCP プロトコル準拠の HTTP transport で通信すること
    design_id: DES-001
    status: pending
  - requirement_id: NFR-04
    title: API キーはサーバー側環境変数で管理・クライアントに公開しないこと
    design_id: DES-001
    status: pending
  - requirement_id: NFR-05
    title: サーバー停止時も既存インデックスデータが失われないこと
    design_id: DES-001
    status: pending
  - requirement_id: NFR-06
    title: エラーおよび処理状況をログとして出力すること
    design_id: DES-001
    status: pending
  - requirement_id: NFR-07
    title: 稼働率・フェイルオーバー要件（スコープ外）
    design_id: DES-001
    status: pending
    exclude_reason: "スコープ外（APP-001 NFR-07 参照）"
  - requirement_id: NFR-08
    title: クエリ応答時間の目標値（TBD-003 未確定）
    design_id: DES-001
    status: pending
    exclude_reason: "TBD-003 確定待ち（APP-001 NFR-08 参照）"

